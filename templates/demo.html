<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Demo | SignBridge AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-body: #f3f4f6;
            --bg-nav: #ffffff;
            --btn-blue: #2563eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow: hidden; }

        nav {
            background: var(--bg-nav);
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            border-bottom: 2px solid var(--border);
        }

        .nav-left { display: flex; align-items: center; gap: 24px; }
        .back-btn { border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; color: var(--text-muted); background: #fff; cursor: pointer; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .demo-title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1.1rem; }
        .hand-icon { color: var(--btn-blue); font-size: 1.3rem; }

        .start-btn { background: var(--btn-blue); color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .page-content { max-width: 1400px; margin: 24px auto; display: grid; grid-template-columns: 1fr 400px; gap: 24px; padding: 0 32px; height: calc(100vh - 120px); }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 6px; box-shadow: var(--shadow); display: flex; flex-direction: column; height: 100%; }
        .card-header { padding: 16px 20px; font-weight: 600; font-size: 1.1rem; color: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items:center; }

        .camera-viewport { margin: 20px; flex: 1; background: #000; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: #fff; overflow: hidden; }
        #video-feed { width: 100%; height: 100%; object-fit: contain; }
        .play-overlay { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .play-triangle { width: 0; height: 0; border-top: 25px solid transparent; border-left: 45px solid #fff; border-bottom: 25px solid transparent; margin-left: 8px; }

        .right-column { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        
        .transcript-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .no-signs { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }
        #sentence-text { font-size: 1.4rem; font-weight: 600; color: var(--btn-blue); line-height: 1.4; word-break: break-word; }

        /* --- Mode Selector --- */
        .mode-selector { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { border: 1px solid var(--border); background: #fff; padding: 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .mode-btn:hover { background: #f9fafb; color: #000; }
        .mode-btn.active { background: #eff6ff; color: var(--btn-blue); border-color: var(--btn-blue); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.1); }
        .mode-btn.full-width { grid-column: span 2; }

        .api-card { background: #000; padding: 20px; color: #fff; font-family: 'JetBrains Mono', monospace; border-radius: 4px; margin: 20px; flex: 0.6; overflow: auto; }
        .code-block { line-height: 1.5; font-size: 0.85rem; }
        .json-key { color: #4ade80; }
        
        /* Icons */
        .icon-group { display: flex; gap: 12px; color: #9ca3af; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="/" class="back-btn">← Home</a>
            <div class="demo-title">
                <span class="hand-icon">👋</span>
                SignBridge Demo
            </div>
        </div>
        <button id="main-action-btn" class="start-btn" onclick="toggleCamera()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <span id="btn-label">Start Camera</span>
        </button>
    </nav>

    <div class="page-content">
        <div class="card">
            <div class="card-header">Camera Feed</div>
            <div class="camera-viewport">
                <div id="camera-placeholder" class="play-overlay">
                    <div class="play-triangle"></div>
                    <div class="placeholder-text">Click "Start Camera" to begin</div>
                </div>
                <img id="video-feed" src="" style="display: none;">
            </div>
        </div>

        <div class="right-column">
            <!-- Mode Selection Card -->
            <div class="card" style="height: auto;">
                <div class="card-header">Target Vocabulary</div>
                <div class="mode-selector">
                    <button id="btn-alphabet" class="mode-btn" onclick="setMode('ALPHABET')">A-Z Alphabet</button>
                    <button id="btn-words" class="mode-btn" onclick="setMode('WORDS')">Common Words</button>
                    <button id="btn-all" class="mode-btn full-width active" onclick="setMode('ALL')">Intelligent Combined (All)</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    Live Transcript
                    <div class="icon-group">
                        <svg onclick="socket.emit('clear_sentence')" style="cursor:pointer" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </div>
                </div>
                <div class="transcript-box">
                    <div id="transcript-empty">
                        <div class="no-signs">No signs detected yet</div>
                        <div class="help-text" style="color:#9ca3af; font-size:0.75rem">Perform a gesture to see results</div>
                    </div>
                    <div id="sentence-text" style="display: none;"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">API Response</div>
                <div class="api-card">
                    <pre id="api-output" class="code-block">{
  <span class="json-key">"status"</span>: "waiting"
}</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let active = false;

        function toggleCamera() { socket.emit('toggle_camera'); }
        function setMode(m) { socket.emit('set_mode', m); }

        socket.on('status_update', (data) => {
            active = data.camera_active;
            const btnLabel = document.getElementById('btn-label');
            const placeholder = document.getElementById('camera-placeholder');
            const video = document.getElementById('video-feed');
            const apiOutput = document.getElementById('api-output');

            if (active) {
                btnLabel.innerText = 'Stop Camera';
                placeholder.style.display = 'none';
                video.style.display = 'block';
                video.src = '/video_feed';
                apiOutput.innerHTML = `{
  <span class="json-key">"status"</span>: "active"
}`;
            } else {
                btnLabel.innerText = 'Start Camera';
                placeholder.style.display = 'flex';
                video.style.display = 'none';
                video.src = '';
                apiOutput.innerHTML = `{
  <span class="json-key">"status"</span>: "waiting"
}`;
            }
        });

        socket.on('mode_updated', (data) => {
            updateModeButtons(data.mode);
        });

        function updateModeButtons(activeMode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            if (activeMode === 'ALPHABET') document.getElementById('btn-alphabet').classList.add('active');
            else if (activeMode === 'WORDS') document.getElementById('btn-words').classList.add('active');
            else if (activeMode === 'ALL') document.getElementById('btn-all').classList.add('active');
        }

        socket.on('detection_update', (data) => {
            if (!active) return;
            const sentenceText = document.getElementById('sentence-text');
            const transcriptEmpty = document.getElementById('transcript-empty');
            const apiOutput = document.getElementById('api-output');

            updateModeButtons(data.mode);

            if (data.sentence) {
                transcriptEmpty.style.display = 'none';
                sentenceText.style.display = 'block';
                sentenceText.innerText = data.sentence;
            } else {
                transcriptEmpty.style.display = 'block';
                sentenceText.style.display = 'none';
            }

            apiOutput.innerHTML = `{
  <span class="json-key">"status"</span>: "active",
  <span class="json-key">"sign"</span>: "${data.sign}",
  <span class="json-key">"mode"</span>: "${data.mode}",
  <span class="json-key">"fps"</span>: ${data.fps}
}`;
        });
    </script>
</body>
</html>
